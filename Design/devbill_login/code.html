<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
      body {
        background-color: #0e1322;
        font-family: 'Manrope', sans-serif;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .radial-glow {
        background: radial-gradient(circle at center, rgba(196, 192, 255, 0.12) 0%, rgba(14, 19, 34, 0) 70%);
      }
      .input-glow:focus {
        box-shadow: 0 0 15px rgba(196, 192, 255, 0.2);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
    </style>

<body class="flex flex-col min-h-screen text-on-surface overflow-hidden">
<!-- Top Navigation Suppression: Linear Transactional Flow -->
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center relative px-6 py-20">
<!-- Ambient Background Decoration -->
<div class="absolute inset-0 radial-glow pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Login Container -->
<div class="w-full max-w-[460px] glass-card rounded-[20px] p-10 md:p-14 z-10 shadow-2xl">
<!-- App Logo / Brand Anchor -->
<div class="flex justify-center mb-12">
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-on-surface font-body font-medium tracking-wide text-sm">DevBill</span>
</div>
</div>
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="font-headline font-light text-4xl md:text-5xl text-on-surface tracking-tight mb-4">Welcome back</h1>
<p class="font-body text-on-surface-variant font-medium text-sm md:text-base">Manage your invoices like a pro.</p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-1.5">
<label class="block font-label text-[11px] uppercase tracking-[0.1em] text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-high/40 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline/50 transition-all px-4 py-4 rounded-xl input-glow font-body text-sm" placeholder="name@atelier.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-end">
<label class="block font-label text-[11px] uppercase tracking-[0.1em] text-on-surface-variant ml-1">Password</label>
<a class="text-[11px] text-primary hover:text-white transition-colors uppercase tracking-wider font-semibold" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-high/40 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline/50 transition-all px-4 py-4 rounded-xl input-glow font-body text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-semibold rounded-xl hover:shadow-[0_0_25px_rgba(196,192,255,0.3)] active:scale-[0.98] transition-all duration-300 font-body tracking-wide">
                        Sign In
                    </button>
</div>
</form>
<!-- Secondary Actions -->
<div class="mt-10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary hover:text-white transition-colors font-semibold ml-1" href="#">Register</a>
</p>
</div>
</div>
</main>
<!-- Footer: Shared Component Mapping -->
<footer class="fixed bottom-0 w-full flex justify-between items-center px-12 py-8 bg-transparent z-20">
<div class="flex items-center gap-6">
<span class="text-lg font-['Noto_Serif'] text-[#c7c4d8]">DevBill.</span>
<div class="hidden md:flex items-center gap-6">
<a class="font-['Manrope'] text-sm font-medium text-[#c7c4d8] hover:text-[#c4c0ff] transition-colors" href="#">Privacy</a>
<a class="font-['Manrope'] text-sm font-medium text-[#c7c4d8] hover:text-[#c4c0ff] transition-colors" href="#">Terms</a>
<a class="font-['Manrope'] text-sm font-medium text-[#c7c4d8] hover:text-[#c4c0ff] transition-colors" href="#">Support</a>
</div>
</div>
<div class="font-['Manrope'] text-xs md:text-sm font-medium text-[#c4c0ff]">
            © 2024 DevBill. The Digital Atelier.
        </div>
</footer>
<!-- Decorative Image Layer (Abstract) -->
<div class="fixed inset-0 -z-10 opacity-20 overflow-hidden pointer-events-none">
<img class="w-full h-full object-cover filter blur-3xl" data-alt="smooth gradient flowing from deep navy to soft lavender with subtle grain texture and ethereal silk-like waves" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsXTw3KN5I7b_lCSurv7OxtBFp_THuMHWF2CYO-0APu7aDx9i9owLjPqT0EAYPccJWV1VmKxuN2-jYYRB2skJKFcxHtRIfJDjCArz2HMhZqH-pd9Inoqr1gB7oh2QnugeeVbR3ljS-ec9tfqVK6ACoH5rqcrmtZJvjpQoWwD8TBZtOtDJQuxMK5NET36NdqPx7qGlxyt-UcPWhkZllRy5VwTlZUX2gAWAAkAEvQTj3xOOuVzOQKoMO54r-QCGmn_hK47hKz23ZlvQ"/>
</div>
